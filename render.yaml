# Render Blueprint for the VousFin backend (Node/Express API).
# Deploy: Render Dashboard → New + → Blueprint → connect this repo → Apply.
# Render reads this file and creates the service; it will prompt you only for the
# env vars marked `sync: false` (your secrets / the frontend URL).
services:
  - type: web
    name: vousfin-backend
    runtime: node
    plan: free
    region: singapore          # closest free region to Pakistan; change if your Atlas is elsewhere
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRY
        value: 24h
      # Auto-generated by Render — you never have to handle this secret.
      - key: JWT_SECRET
        generateValue: true
      # Let users sign up + log in immediately without an SMTP server configured.
      # Set to "false" once you add real SMTP_* vars below.
      - key: SKIP_EMAIL_VERIFICATION
        value: "true"
      # ── You fill these in the Render UI (Render prompts for sync:false vars) ──
      # MONGO_URI: copy from your local .env (MongoDB Atlas connection string).
      - key: MONGO_URI
        sync: false
      # CLIENT_URL: set to your deployed frontend URL (e.g. https://vousfin.vercel.app)
      # AFTER the frontend is live. Drives CORS — must match the frontend origin exactly.
      - key: CLIENT_URL
        sync: false
      # ── Optional (features degrade gracefully if left unset) ──
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
